        const data = {"commits": [{"sha": "670b8bb", "date": "1729159769", "message": "tests: benchmark: remove half of the dropAfterXRules benchmarks\n\nNot all the power of two need to be benchmarked when it comes to\ndropAfterXRules. Keep only meaningful values.\n"}, {"sha": "ce8f2c7", "date": "1729499952", "message": "core: btf: add function to get type name from ID\n\nAdd `bf_btf_get_name()` to retrieve a kernel type name from its BTF ID.\n"}, {"sha": "840dad4", "date": "1729499952", "message": "doc: prevent Doxygen from processing src/external/* files\n\nSource files located in src/external/* are imported from external\nproject (in this case the Linux kernel). They are copy-pasted and not\nmodified. Running Doxygen or clang-tidy on those makes no sense has we\nhave no control over them and can't fix potential errors.\n"}, {"sha": "f8c32dd", "date": "1729499952", "message": "core: opts: add `--verbose bytecode` option to dump the bytecode\n\nWhen `--verbose bytecode` is used, bpfilter will dump a program's\nbytecode before loading it.\n"}, {"sha": "241075d", "date": "1729499952", "message": "cgen: dump: refactor the program dump logic\n\nThe program dump logic is buggy and incomplete, leading to erroneous\ntranslation of the program. Maintaining such a logic is cumbersome as\nwe need to handle various edge cases.\n\nInspired by bpftool, the program dump logic is replaced by Linux\ndisasm.c from the kernel tree. Thanks change ensures the printed\nbytecode is consistent with the output of the BPF verifier and bpftool.\n\nThanks to Quentin Monnet his advice to perform the bytecode dump.\n"}, {"sha": "e2ef0f5", "date": "1729504965", "message": "build: disable clang-analyzer-deadcode.DeadStores in .clang-tidy\n\nclang-analyzer-deadcode.DeadStores will produce false positives in the\nfollowing situation:\n\n    _cleanup_bf_jmpctx_ struct bf_jmpctx _;\n    [...]\n    _ = bf_jmpctx_get();\n\nClaiming the value stored in `_` is never read. While this is\ntechnicallu true in the function's body, the value is used during\ncleanup.\n\nDisabling this check shouldn't hide other issues as unused variables are\nflagged by the compiler already.\n"}, {"sha": "0ade1c2", "date": "1729504965", "message": "cgen: program: initalize the runtime context's packet metadata fields\n\nSet l3_proto, l4_proto, l3_offset, and l4_offset fields in the program's\nruntime metadata to 0 during initialization. This ways, those fields\nhave a default value meaning \"header protocol is not supported\" by\ndefault.\n"}, {"sha": "3852eb1", "date": "1729504965", "message": "cgen: stub: do not parse unknown L3/L4 protocol headers\n\nHandling of unsupported L3 and L4 protocols is erroneous as we accept\nunknown packets by default. This is obviously the wrong approach.\n\nThis change read the expected protocol from the runtime context and\nskipp the header processing if it is 0 (undefined). Hence, subsequent\nprotocol types won't be set, skipping the processing of those: if L3 is\nnot processed, l4_proto is not set, and L4 processing is skipped.\n\nSimilarly, matchers validate the protocol before checking the packet's\ndata, so e.g. TCP matchers wouldn't run on unknown L4 protocol.\n"}, {"sha": "ef09734", "date": "1729504965", "message": "cgen: cgroup,nf: do not ACCEPT by default if the L3 protocol is unknown\n\nUse the program's argument (e.g. __sk_buff) to fill l3_proto and\nl3_offset. If the L3 protocol is unknown, set l3_proto to 0 to skill the\nheader pre-processing.\n"}, {"sha": "33b5157", "date": "1729519985", "message": "cgen: stub: read l4_proto as u8, not u16\n\nl4_proto is stored as an 8-bit value, reading it as a 16-bit value mess\nup the program verification (as it should). Fix it.\n"}, {"sha": "5296767", "date": "1729519985", "message": "cgen: stub: set {l3,l4}_proto to 0 in runtime context for unknown protocols\n\nIf the L3 or L4 protocol stored in ctx.{l3,l4}_proto is unknown, the\nprogram generated by bpfilter will ignore any related matcher. However,\nthe verifier will reject the program as it has no information on what is\nthe expected L3/L4 protocol.\n\nFix the verifier rejection by explicitly storing 0 to {l3,l4}_proto is\nthe protocol is unknown.\n"}, {"sha": "8c509ef", "date": "1729522330", "message": "core: matcher: add range matcher for tcp and udp ports\n\nAdd a new matcher operator for ranges used as `$START-$END` and add\nsupport for it for TCP and UDP port (source and destination).\n"}], "results": {"firstRuleDropCounter": {"0ade1c2": {"iters": 55000000, "time": 13.05015490771356, "nInsn": 641.0}, "241075d": {"iters": 52000000, "time": 13.21331645997886, "nInsn": 622.0}, "3852eb1": {"iters": 58000000, "time": 11.72476819041988, "nInsn": 657.0}, "670b8bb": {"iters": 51000000, "time": 12.618474803828434, "nInsn": 622.0}, "840dad4": {"iters": 55000000, "time": 13.3811060720208, "nInsn": 622.0}, "ce8f2c7": {"iters": 52000000, "time": 12.681227096786293, "nInsn": 622.0}, "e2ef0f5": {"iters": 51000000, "time": 12.68063074288269, "nInsn": 622.0}, "ef09734": {"iters": 63000000, "time": 11.363087364265487, "nInsn": 653.0}, "f8c32dd": {"iters": 56000000, "time": 11.584885767661035, "nInsn": 622.0}, "33b5157": {"iters": 56000000, "time": 12.643045803997666, "nInsn": 653.0}, "5296767": {"iters": 50000000, "time": 13.70062727946788, "nInsn": 662.0}, "8c509ef": {"iters": 51000000, "time": 13.181192843773056, "nInsn": 662.0}}, "dropAfterXRules/8": {"0ade1c2": {"iters": 52000000, "time": 12.708511790081571, "nInsn": 676.0}, "241075d": {"iters": 54000000, "time": 13.83109912879903, "nInsn": 657.0}, "3852eb1": {"iters": 61000000, "time": 12.123404820755, "nInsn": 692.0}, "670b8bb": {"iters": 57000000, "time": 13.50908533449432, "nInsn": 657.0}, "840dad4": {"iters": 54000000, "time": 13.301441314440497, "nInsn": 657.0}, "ce8f2c7": {"iters": 53000000, "time": 13.423037227629772, "nInsn": 657.0}, "e2ef0f5": {"iters": 52000000, "time": 13.5410785195955, "nInsn": 657.0}, "ef09734": {"iters": 58000000, "time": 12.288704398 36000000, "time": 19.395062777524192, "nInsn": 1291.0}, "5296767": {"iters": 37000000, "time": 19.234548351173665, "nInsn": 1300.0}, "8c509ef": {"iters": 36000000, "time": 19.374804386946685, "nInsn": 1300.0}}, "dropAfterXRules/512": {"0ade1c2": {"iters": 13000000, "time": 55.61000023646137, "nInsn": 3199.0}, "241075d": {"iters": 13000000, "time": 56.093367004695416, "nInsn": 3180.0}, "3852eb1": {"iters": 13000000, "time": 55.46923569188668, "nInsn": 3215.0}, "670b8bb": {"iters": 13000000, "time": 56.31148084425009, "nInsn": 3180.0}, "840dad4": {"iters": 13000000, "time": 56.26252445822152, "nInsn": 3180.0}, "ce8f2c7": {"iters": 13000000, "time": 56.22601585211948, "nInsn": 3180.0}, "e2ef0f5": {"iters": 13000000, "time": 56.22102169749829, "nInsn": 3180.0}, "ef09734": {"iters": 13000000, "time": 55.02723253224619, "nInsn": 3211.0}, "f8c32dd": {"iters": 13000000, "time": 56.44765908185106, "nInsn": 3180.0}, "33b5157": {"iters": 13000000, "time": 56.2504153036011, "nInsn": 3211.0}, "5296767": {"iters": 13000000, "time": 56.74092107130071, "nInsn": 3220.0}, "8c509ef": {"iters": 13000000, "time": 56.046396843157716, "nInsn": 3220.0}}, "dropAfterXRules/2048": {"0ade1c2": {"iters": 4000000, "time": 202.63699625502343, "nInsn": 10879.0}, "241075d": {"iters": 4000000, "time": 200.5391817365307, "nInsn": 10860.0}, "3852eb1": {"iters": 4000000, "time": 201.38951172702943, "nInsn": 10895.0}, "670b8bb": {"iters": 4000000, "time": 200.80588202108626, "nInsn": 10860.0}, "840dad4": {"iters": 4000000, "time": 201.76919625373557, "nInsn": 10860.0}, "ce8f2c7": {"iters": 4000000, "time": 201.56003700685685, "nInsn": 10860.0}, "e2ef0f5": {"iters": 4000000, "time": 200.0869352486916, "nInsn": 10860.0}, "ef09734": {"iters": 4000000, "time": 198.38139202329333, "nInsn": 10891.0}, "f8c32dd": {"iters": 4000000, "time": 201.31380175007507, "nInsn": 10860.0}, "33b5157": {"iters": 4000000, "time": 200.75227474444543, "nInsn": 10891.0}, "5296767": {"iters": 4000000, "time": 200.4963542567566, "nInsn": 10900.0}, "8c509ef": {"iters": 4000000, "time": 202.29863200802356, "nInsn": 10900.0}}}, "benchNames": ["firstRuleDropCounter", "dropAfterXRules/8", "dropAfterXRules/32", "dropAfterXRules/128", "dropAfterXRules/512", "dropAfterXRules/2048"]}

        function render() {
            for (const benchName of data.benchNames) {
                makeTable(benchName, data.commits, data.results[benchName])
                makeChart(benchName, data.commits, data.results[benchName])
            }

        }

        function makeTable(name, commits, results) {

            const newCommit = commits[commits.length - 1];
            const newResults = results[newCommit.sha];
            const newTime = newResults.time;
            const newInsns = newResults.nInsn;

            let newHtml = `<td class="text-end font-monospace">${parseFloat(newResults.time).toFixed(2)}</td>`;
            newHtml += `<td class="text-end font-monospace">${newResults.nInsn}</td>`;

            let diffHtml = '';
            let oldHtml = '';

            if (commits.length > 1) {
                // There is a second to last commit
                const oldCommit = commits.length > 1 ? commits[commits.length - 2] : null;
                const oldResults = results[oldCommit.sha];

                const oldTime = oldResults.time;
                const oldInsns = oldResults.nInsn;
                const absTime = newTime - oldTime;
                const absInsns = newInsns - oldInsns;
                const diffTime = (absTime / oldTime) * 100;
                const diffInsns = (absInsns / oldInsns) * 100;

                const timeDiffClass = diffTime > 0 ? "text-danger" : "text-success";
                const nInsnsDiffClass = diffInsns > 0 ? "text-danger" : "text-success";
                diffHtml += `<td class="text-end font-monospace ${timeDiffClass}">${(diffTime < 0 ? "" : "+") + parseFloat(diffTime).toFixed(2)}% (${(absTime < 0 ? "" : "+") + parseFloat(absTime).toFixed(2)})</td>`;
                diffHtml += `<td class="text-end font-monospace ${nInsnsDiffClass}">${(diffInsns < 0 ? "" : "+") + parseFloat(diffInsns).toFixed(2)}% (${(absInsns < 0 ? "" : "+") + parseFloat(absInsns)})</td>`;

                oldHtml += `<td class="text-end font-monospace">${parseFloat(oldResults.time).toFixed(2)}</td>`;
                oldHtml += `<td class="text-end font-monospace">${oldResults.nInsn}</td>`;
            } else {
                diffHtml += '<td class="text-end font-monospace">n/a</td><td class="font-monospace">n/a</td>';
                oldHtml += '<td class="text-end font-monospace">n/a</td><td class="font-monospace">n/a</td>';
            }


            let data = '<tr>';
            data += `<td>${name}</td>`;
            data += diffHtml;
            data += newHtml;
            data += oldHtml;
            data += '</tr>';

            const table = document.getElementById('table-body');
            table.insertAdjacentHTML("beforeend", data);
        }

        function makeChart(name, commits, results) {
            const ctx = document.getElementById('charts');
            ctx.insertAdjacentHTML("beforeend",
                `<div class="col container-fluid my-3" id="${name}"><h5>${name}</h5></div>`
            );

            const chartCtx = document.getElementById(name);
            chartCtx.insertAdjacentHTML("beforeend",
                `<canvas id="${name}Chart"></canvas>`
            );

            var durations = []
            var nInsns = []
            var labels = []
            for (commit of commits) {
                const result = results[commit.sha]
                if (result == undefined) {
                    durations.push(null);
                    nInsns.push(null);
                } else {
                    durations.push(result.time);
                    nInsns.push(result.nInsn);
                }

                labels.push(commit.sha);
            }

            const afterTitle = (tooltipItems) => {
                const commit = commits.find((e) => e.sha == tooltipItems[0].label);
                return commit.message;
            };

            new Chart(document.getElementById(name + "Chart"), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Duration',
                            data: durations,
                            yAxisID: 'duration',
                            tension: 0.1,
                            fill: true,
                            order: 2,
                        },
                        {
                            label: '# of instructions',
                            data: nInsns,
                            yAxisID: 'instructions',
                            tension: 0.1,
                            order: 1,
                        }
                    ]
                },
                options: {
                    interaction: {
                        intersect: false,
                        mode: 'index',
                    },
                    plugins: {

                        tooltip: {
                            callbacks: {
                                afterTitle: afterTitle,
                                label: function (context) {
                                    let label = '';

                                    if (context.dataset.yAxisID == "duration")
                                        label = parseFloat(context.parsed.y).toFixed(2) + " ns"
                                    else if (context.dataset.yAxisID == "instructions")
                                        label = parseInt(context.parsed.y) + " instructions"
                                    else
                                        label = context.parsed.y;

                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        duration: {
                            id: 't (ns)',
                            type: 'linear',
                            position: 'left',
                            min: 0,
                            title: {
                                display: true,
                                text: 'ns'
                            },
                        },
                        instructions: {
                            id: '# insn',
                            type: 'linear',
                            position: 'right',
                            min: 0,
                            title: {
                                display: true,
                                text: '# insn'
                            },
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Commit'
                            },
                        }
                    },
                    onClick: function (e) {
                        const sha = e.chart.tooltip.dataPoints[0].label
                        if (sha.endsWith("+"))
                            return;
                        window.open("https://github.com/facebook/bpfilter/commit/" + sha, "_blank");
                    }
                }
            });
        }
    </script>
